<div class="sunsliced-logo-container" style="display: flex; align-items: center; gap: 14px; cursor: pointer; font-family: 'Inter', sans-serif;">
    <!-- Abstract Premium SVG Icon -->
    <div class="logo-graphic-wrapper" style="position: relative; width: 50px; height: 50px; filter: drop-shadow(0px 4px 10px rgba(224, 123, 57, 0.25));">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
            <!-- Outer Sun Rays / Crisp Dehydration Shell -->
            <circle cx="50" cy="50" r="44" fill="none" stroke="#e07b39" stroke-width="3" stroke-dasharray="6 4" opacity="0.85"/>
            
            <!-- Main Inner Slice Shield -->
            <path d="M 50,12 A 38,38 0 0,1 88,50 L 50,50 Z" fill="#f5c542" opacity="0.95" />
            <path d="M 50,50 L 88,50 A 38,38 0 0,1 50,88 Z" fill="#e07b39" />
            <path d="M 50,50 L 50,88 A 38,38 0 0,1 12,50 Z" fill="#1a5c3a" />
            <path d="M 12,50 A 38,38 0 0,1 50,12 L 50,50 Z" fill="#227046" opacity="0.9" />
            
            <!-- Geometric Slice Lines (Sun Burst) -->
            <line x1="50" y1="12" x2="50" y2="88" stroke="#fdf8f0" stroke-width="2.5" />
            <line x1="12" y1="50" x2="88" y2="50" stroke="#fdf8f0" stroke-width="2.5" />
            <line x1="23.2" y1="23.2" x2="76.8" y2="76.8" stroke="#fdf8f0" stroke-width="2" />
            <line x1="23.2" y1="76.8" x2="76.8" y2="23.2" stroke="#fdf8f0" stroke-width="2" />
            
            <!-- Center Core Balance Dot -->
            <circle cx="50" cy="50" r="6" fill="#fdf8f0" />
        </svg>
    </div>

    <!-- Typography Matrix -->
    <div class="logo-text-block">
        <div style="font-family: 'Playfair Display', serif; font-size: 1.45rem; font-weight: 700; color: #1a5c3a; letter-spacing: -0.3px; line-height: 1.1;">
            Sun<span style="color: #e07b39;">sliced</span>
        </div>
        <div style="font-size: 0.78rem; font-weight: 600; color: #6b6b6b; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px;">
            Foods & Organics
        </div>
    </div>
</div>
